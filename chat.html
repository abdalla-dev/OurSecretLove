<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Our Private Corner — Koty &amp; Lolty</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&family=Parisienne&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF4EF;--paper-2:#F5E7E0;--blush:#F3D9DC;--rose:#B23A54;
    --rose-soft:#C96A7E;--wine:#5A1D2E;--gold:#B98E4C;--ink:#3A2028;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:
      radial-gradient(120% 60% at 50% 0%, var(--blush) 0%, rgba(243,217,220,0) 55%),
      var(--paper);
    color:var(--ink);font-family:"Jost",system-ui,sans-serif;font-weight:300;
    display:flex;flex-direction:column;height:100dvh;overflow:hidden;
  }
  .script{font-family:"Parisienne",cursive;}
  a{color:inherit;}

  header{
    text-align:center;padding:16px 16px 12px;border-bottom:1px solid rgba(185,142,76,.28);
    background:rgba(251,244,239,.85);backdrop-filter:blur(6px);
  }
  header .back{position:absolute;left:14px;top:16px;text-decoration:none;color:var(--rose-soft);font-size:1.4rem;}
  header .ttl{font-family:"Parisienne",cursive;color:var(--rose);font-size:1.9rem;line-height:1;}
  header .sub{font-family:"Cormorant Garamond",serif;font-style:italic;color:var(--wine);font-size:.98rem;margin-top:2px;}
  header .me{margin-top:6px;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);}
  header .me a{color:var(--rose);cursor:pointer;text-decoration:underline;}

  .stream{flex:1;overflow-y:auto;padding:18px 14px 6px;display:flex;flex-direction:column;gap:10px;}
  .empty{margin:auto;text-align:center;color:var(--rose-soft);font-family:"Cormorant Garamond",serif;font-style:italic;font-size:1.15rem;max-width:280px;line-height:1.6;}
  .empty .h{font-size:2rem;color:var(--rose);}

  .msg{max-width:78%;padding:10px 14px;border-radius:18px;line-height:1.45;font-size:1rem;position:relative;word-wrap:break-word;animation:pop .3s ease;}
  @keyframes pop{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .msg .who{display:block;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;margin-bottom:3px;opacity:.7;}
  .msg .t{display:block;font-size:.6rem;opacity:.55;margin-top:4px;text-align:right;}
  .mine{align-self:flex-end;background:var(--rose);color:#fff;border-bottom-right-radius:5px;}
  .mine .who{color:#ffe6ec;}
  .theirs{align-self:flex-start;background:#fff;color:var(--wine);border:1px solid var(--blush);border-bottom-left-radius:5px;}
  .theirs .who{color:var(--rose-soft);}

  .chips{display:flex;gap:8px;overflow-x:auto;padding:8px 14px 4px;scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{white-space:nowrap;flex:0 0 auto;background:var(--paper-2);border:1px solid rgba(185,142,76,.4);
    color:var(--wine);border-radius:999px;padding:8px 14px;font-family:"Jost";font-size:.85rem;cursor:pointer;transition:transform .15s,background .15s;}
  .chip:hover{background:var(--blush);transform:translateY(-1px);}

  .composer{display:flex;gap:8px;padding:10px 12px calc(12px + env(safe-area-inset-bottom));border-top:1px solid rgba(185,142,76,.28);background:rgba(251,244,239,.92);}
  .composer input{flex:1;border:1px solid rgba(185,142,76,.5);border-radius:999px;padding:12px 16px;font-family:"Jost";font-size:1rem;background:#fff;color:var(--ink);outline:none;}
  .composer input:focus{border-color:var(--rose-soft);}
  .composer button{border:none;background:var(--rose);color:#fff;width:48px;height:48px;border-radius:50%;font-size:1.3rem;cursor:pointer;flex:0 0 auto;box-shadow:0 8px 18px -8px rgba(178,58,84,.9);}
  .composer button:active{transform:scale(.94);}

  .note{text-align:center;font-size:.68rem;color:var(--gold);padding:0 16px 6px;opacity:.9;}

  /* name gate */
  .gate{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;padding:24px;
    background:radial-gradient(130% 120% at 50% -10%, rgba(243,217,220,.97), rgba(90,29,46,.94));}
  .gate.hide{display:none;}
  .gate .card{background:var(--paper);border:1px solid rgba(185,142,76,.55);border-radius:22px;padding:34px 26px;text-align:center;max-width:340px;width:100%;box-shadow:0 30px 80px -34px rgba(20,6,12,.85);}
  .gate h2{font-family:"Parisienne",cursive;color:var(--rose);font-size:2.2rem;font-weight:400;margin-bottom:4px;}
  .gate p{font-family:"Cormorant Garamond",serif;font-style:italic;color:var(--wine);margin-bottom:22px;}
  .gate .pick{display:flex;gap:12px;}
  .gate .pick button{flex:1;background:var(--rose);color:#fff;border:none;border-radius:14px;padding:16px 10px;font-family:"Parisienne",cursive;font-size:1.5rem;cursor:pointer;box-shadow:0 12px 26px -14px rgba(178,58,84,.9);}
  .gate .pick button.alt{background:var(--wine);}
</style>
</head>
<body>

  <div class="gate" id="gate">
    <div class="card">
      <h2>Who's here? &#10084;</h2>
      <p>Tap your name so your love knows it's you.</p>
      <div class="pick">
        <button data-name="Koty">Koty</button>
        <button class="alt" data-name="Lolty">Lolty</button>
      </div>
    </div>
  </div>

  <header>
    <a class="back" href="index.html" aria-label="Back to our page">&#8592;</a>
    <div class="ttl">Our Private Corner</div>
    <div class="sub">even when words are hard, I'm still here &#10084;</div>
    <div class="me" id="meLine"></div>
  </header>

  <div class="stream" id="stream">
    <div class="empty" id="empty"><span class="h">&#10084;</span><br>No messages yet.<br>Say the first soft word.</div>
  </div>

  <div class="chips" id="chips"></div>

  <div class="composer">
    <input id="input" type="text" placeholder="Write something gentle…" autocomplete="off" />
    <button id="send" aria-label="Send">&#10148;</button>
  </div>
  <div class="note" id="note"></div>

<script>
/* ---------- config: paste your Firebase settings between the braces ---------- */
var firebaseConfig = {
  apiKey: "AIzaSyDVTXFV6iGxCt0Eu5aR7cw7pn58r3msIvs",
  authDomain: "our-corner-a8019.firebaseapp.com",
  projectId: "our-corner-a8019",
  storageBucket: "our-corner-a8019.firebasestorage.app",
  messagingSenderId: "512923628462",
  appId: "1:512923628462:web:120f019d385644a0290e3f",
  measurementId: "G-7KTTBVL9TP"
};
/* ------------------------------------------------------------------------------ */

(function(){
  var stream=document.getElementById('stream'), empty=document.getElementById('empty'),
      input=document.getElementById('input'), sendBtn=document.getElementById('send'),
      gate=document.getElementById('gate'), meLine=document.getElementById('meLine'),
      note=document.getElementById('note'), chipsBox=document.getElementById('chips');

  var me=null, messages=[], backend=null;

  // sweet ice-breakers
  var chips=["I'm sorry ❤️","Can we talk when you're ready?","I miss you 🥺","معلش يا حبيبتي 🌹",
             "I love you, always","Let's not sleep angry 🌙","You matter to me","Can I hold your hand?"];
  chips.forEach(function(c){
    var b=document.createElement('button'); b.className='chip'; b.textContent=c;
    b.addEventListener('click',function(){ input.value=c; input.focus(); });
    chipsBox.appendChild(b);
  });

  // storage helpers (safe)
  function lsGet(k){ try{return localStorage.getItem(k);}catch(e){return null;} }
  function lsSet(k,v){ try{localStorage.setItem(k,v);}catch(e){} }

  // ---- local fallback backend (per-device) ----
  function LocalBackend(){
    var key='koty_lolty_chat', mem=[];
    try{ mem=JSON.parse(lsGet(key)||'[]'); }catch(e){ mem=[]; }
    return {
      subscribe:function(cb){ cb(mem.slice()); this._cb=cb; },
      send:function(m){ mem.push(m); lsSet(key,JSON.stringify(mem)); if(this._cb) this._cb(mem.slice()); }
    };
  }

  function fmtTime(ts){ try{var d=new Date(ts);return d.toLocaleString([], {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}catch(e){return '';} }

  function render(list){
    messages=(list||[]).slice().sort(function(a,b){return (a.clientTs||0)-(b.clientTs||0);});
    stream.innerHTML='';
    if(!messages.length){ stream.appendChild(empty); return; }
    messages.forEach(function(m){
      var d=document.createElement('div');
      d.className='msg '+(m.name===me?'mine':'theirs');
      d.innerHTML='<span class="who"></span><span class="body"></span><span class="t"></span>';
      d.querySelector('.who').textContent=m.name||'';
      d.querySelector('.body').textContent=m.text||'';
      d.querySelector('.t').textContent=fmtTime(m.clientTs);
      stream.appendChild(d);
    });
    stream.scrollTop=stream.scrollHeight;
  }

  function doSend(){
    var text=(input.value||'').trim();
    if(!text||!me||!backend) return;
    backend.send({name:me,text:text,clientTs:Date.now()});
    input.value=''; input.focus();
  }
  sendBtn.addEventListener('click',doSend);
  input.addEventListener('keydown',function(e){ if(e.key==='Enter'){e.preventDefault();doSend();} });

  function start(){
    if(!backend){ backend=LocalBackend(); }
    backend.subscribe(render);
  }

  // name gate
  function setMe(name){
    me=name; lsSet('koty_lolty_me',name);
    meLine.innerHTML="You're chatting as <b>"+name+"</b> · <a id='switch'>switch</a>";
    document.getElementById('switch').addEventListener('click',function(){ lsSet('koty_lolty_me',''); location.reload(); });
    gate.classList.add('hide');
    start();
  }
  var saved=lsGet('koty_lolty_me');
  if(saved){ setMe(saved); } 
  Array.prototype.forEach.call(document.querySelectorAll('.gate .pick button'),function(b){
    b.addEventListener('click',function(){ setMe(b.getAttribute('data-name')); });
  });

  // expose a hook so the Firebase module can take over
  window.__useCloudBackend=function(cloud){
    backend=cloud;
    if(me){ backend.subscribe(render); }
  };
  window.__setNote=function(txt){ note.textContent=txt; };

  // default note
  if(String(firebaseConfig.apiKey).indexOf('PASTE')>-1){
    window.__setNote("Demo mode: messages stay on this device only. Add Firebase to sync between your phones.");
  }
})();
</script>

<!-- Firebase realtime sync (activates only when config is filled in) -->
<script type="module">
  if(String(firebaseConfig.apiKey).indexOf('PASTE')===-1){
    try{
      const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
      const { getFirestore, collection, addDoc, query, orderBy, onSnapshot } =
        await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const col = collection(db, "messages");
      const cloud = {
        subscribe(cb){
          const q = query(col, orderBy("clientTs"));
          onSnapshot(q, function(snap){
            const arr=[]; snap.forEach(function(doc){ arr.push(doc.data()); }); cb(arr);
          });
        },
        send(m){ addDoc(col, m); }
      };
      window.__useCloudBackend(cloud);
      window.__setNote("💞 Synced — your messages reach each other's phones.");
    }catch(err){
      window.__setNote("Couldn't connect to sync — messages are saved on this device for now.");
    }
  }
</script>

<!-- visit tracker: logs who opened the page and for how long (see stats.html) -->
<script type="module">
try{
  const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
  const { getFirestore, collection, addDoc, updateDoc, serverTimestamp } =
    await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");

  // separate named app so it never clashes with the chat sync above
  const app = initializeApp(window.firebaseConfig, "visit-tracker");
  const db = getFirestore(app);

  // who: taken from ?v=name in the link, then remembered on this device
  let who = new URLSearchParams(location.search).get("v");
  if(who){ localStorage.setItem("osl_visitor", who); }
  else{ who = localStorage.getItem("osl_visitor") || "unknown"; }

  const visitRef = await addDoc(collection(db, "visits"), {
    visitor: who,
    page: location.pathname.split("/").pop() || "chat.html",
    startedAt: serverTimestamp(),
    startedAtLocal: new Date().toISOString(),
    seconds: 0,
    device: navigator.userAgent
  });

  // count time only while the tab is visible
  let activeMs = 0, lastTick = Date.now(), dirty = false;
  function tick(){
    const now = Date.now();
    if(document.visibilityState === "visible"){ activeMs += now - lastTick; dirty = true; }
    lastTick = now;
  }
  function flush(){
    tick();
    if(!dirty) return;
    dirty = false;
    updateDoc(visitRef, {
      seconds: Math.round(activeMs/1000),
      endedAtLocal: new Date().toISOString()
    }).catch(function(){ dirty = true; });
  }
  setInterval(tick, 5000);
  setInterval(flush, 20000);
  document.addEventListener("visibilitychange", function(){
    if(document.visibilityState === "hidden") flush();
    else lastTick = Date.now();
  });
  window.addEventListener("pagehide", flush);
}catch(e){ /* tracking is best-effort; never break the page */ }
</script>
</body>
</html>

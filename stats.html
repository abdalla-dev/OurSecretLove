<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Visits</title>
<meta name="robots" content="noindex,nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF4EF; --blush:#F3D9DC; --rose:#B23A54; --wine:#5A1D2E;
    --gold:#B98E4C; --ink:#3A2028;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--paper); color:var(--ink);
    font-family:"Jost",system-ui,sans-serif; font-weight:300;
    padding:40px 16px 80px; line-height:1.6;
  }
  .wrap{max-width:860px;margin:0 auto;}
  h1{
    font-family:"Cormorant Garamond",serif; font-weight:600;
    color:var(--rose); font-size:2.2rem; margin-bottom:4px;
  }
  .sub{color:var(--gold);letter-spacing:.2em;text-transform:uppercase;font-size:.7rem;margin-bottom:28px;}
  .cards{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:28px;}
  .card{
    background:#fff;border:1px solid var(--blush);border-radius:14px;
    padding:14px 20px;min-width:150px;box-shadow:0 2px 10px rgba(90,29,46,.05);
  }
  .card .who{font-weight:500;color:var(--wine);}
  .card .nums{font-size:.85rem;color:var(--ink);opacity:.8;}
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 10px rgba(90,29,46,.05);}
  th,td{padding:10px 14px;text-align:left;font-size:.9rem;}
  th{background:var(--blush);color:var(--wine);font-weight:500;letter-spacing:.05em;}
  tr:nth-child(even) td{background:#FDF9F6;}
  td.min{white-space:nowrap;font-weight:500;color:var(--rose);}
  .empty{padding:30px;text-align:center;opacity:.7;}
  @media(max-width:600px){ th:nth-child(5),td:nth-child(5){display:none;} }
</style>
</head>
<body>
<div class="wrap">
  <h1>Who visited 💌</h1>
  <div class="sub">Page opens &amp; time spent</div>
  <div class="cards" id="cards"></div>
  <table>
    <thead>
      <tr><th>Who</th><th>Page</th><th>Opened</th><th>Time</th><th>Device</th></tr>
    </thead>
    <tbody id="rows"><tr><td colspan="5" class="empty">Loading…</td></tr></tbody>
  </table>
</div>

<script type="module">
try{
  const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
  const { getFirestore, collection, query, orderBy, limit, getDocs } =
    await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");

  const app = initializeApp({
    apiKey: "AIzaSyDVTXFV6iGxCt0Eu5aR7cw7pn58r3msIvs",
    authDomain: "our-corner-a8019.firebaseapp.com",
    projectId: "our-corner-a8019",
    storageBucket: "our-corner-a8019.firebasestorage.app",
    messagingSenderId: "512923628462",
    appId: "1:512923628462:web:120f019d385644a0290e3f"
  });
  const db = getFirestore(app);

  const snap = await getDocs(query(collection(db,"visits"), orderBy("startedAt","desc"), limit(300)));
  const visits = [];
  snap.forEach(d => visits.push(d.data()));

  function fmtDur(sec){
    sec = sec || 0;
    if(sec < 60) return sec + "s";
    return Math.floor(sec/60) + "m " + (sec%60) + "s";
  }
  function fmtWhen(v){
    const d = v.startedAt && v.startedAt.toDate ? v.startedAt.toDate()
            : (v.startedAtLocal ? new Date(v.startedAtLocal) : null);
    return d ? d.toLocaleString(undefined,{dateStyle:"medium",timeStyle:"short"}) : "—";
  }
  function shortDevice(ua){
    if(!ua) return "—";
    if(/iPhone/i.test(ua)) return "iPhone";
    if(/iPad/i.test(ua)) return "iPad";
    if(/Android/i.test(ua)) return "Android";
    if(/Windows/i.test(ua)) return "Windows";
    if(/Macintosh/i.test(ua)) return "Mac";
    return "Other";
  }

  // per-visitor summary cards
  const byWho = {};
  for(const v of visits){
    const w = v.visitor || "unknown";
    byWho[w] = byWho[w] || { visits:0, seconds:0 };
    byWho[w].visits++;
    byWho[w].seconds += (v.seconds || 0);
  }
  document.getElementById("cards").innerHTML = Object.entries(byWho).map(([w,s]) =>
    '<div class="card"><div class="who">' + w + '</div>' +
    '<div class="nums">' + s.visits + ' visit' + (s.visits===1?'':'s') + ' · ' + fmtDur(s.seconds) + ' total</div></div>'
  ).join("") || "";

  document.getElementById("rows").innerHTML = visits.length
    ? visits.map(v =>
        "<tr><td>" + (v.visitor || "unknown") + "</td>" +
        "<td>" + (v.page || "—") + "</td>" +
        "<td>" + fmtWhen(v) + "</td>" +
        '<td class="min">' + fmtDur(v.seconds) + "</td>" +
        "<td>" + shortDevice(v.device) + "</td></tr>"
      ).join("")
    : '<tr><td colspan="5" class="empty">No visits recorded yet.</td></tr>';
}catch(e){
  document.getElementById("rows").innerHTML =
    '<tr><td colspan="5" class="empty">Couldn\'t load visits — check Firestore rules allow reading the "visits" collection.</td></tr>';
}
</script>
</body>
</html>
